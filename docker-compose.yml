# Full local stack: the Shonkor web app + a local Ollama for semantic enrichment
# (summaries via qwen2.5-coder) and embeddings (search_semantic via nomic-embed-text).
#
# Usage:
#   TARGET_PROJECTS_DIR=/path/to/your/code docker compose up --build
# (or put TARGET_PROJECTS_DIR in a .env file next to this one).

services:
  shonkor-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shonkor-web
    ports:
      - "5290:8080" # host 5290 -> container 8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - SemanticAnalyzer__OllamaUrl=http://ollama:11434
      - EmbeddingService__OllamaUrl=http://ollama:11434
      - EmbeddingService__OllamaModel=nomic-embed-text
    volumes:
      # Maps the host directory (from TARGET_PROJECTS_DIR, default current dir) to /projects.
      # Shonkor uses /projects as its working dir and creates projects.json + the SQLite DBs there.
      - ${TARGET_PROJECTS_DIR:-./}:/projects
    working_dir: /projects
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      # Readiness: workspace writable + graph store reachable (see StorageHealthCheck).
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    container_name: shonkor-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Pull BOTH models on first start: the coder model for summaries and the embed
    # model for vector search. Without nomic-embed-text, search_semantic would fail.
    command: >
      bash -c "ollama serve &
      sleep 5 &&
      ollama pull qwen2.5-coder &&
      ollama pull nomic-embed-text &&
      wait"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 5
    # ---------------------------------------------------------
    # UNCOMMENT BELOW TO ENABLE NVIDIA GPU ACCELERATION
    # ---------------------------------------------------------
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  ollama_data:
