name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Shonkor.slnx

      - name: Build (Release)
        run: dotnet build Shonkor.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/Shonkor.Tests/Shonkor.Tests.csproj --configuration Release --no-build --verbosity normal
