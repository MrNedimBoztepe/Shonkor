name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner for Build & Test'
        type: choice
        default: ubuntu-latest
        options:
          - ubuntu-latest
          - self-hosted

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    # Manual runs take the runner from the dispatch input. Automatic runs (push/PR) honour the
    # repository variable CI_RUNNER (set it to `self-hosted` to move CI onto the local runner),
    # and fall back to the GitHub-hosted image when neither is set.
    runs-on: ${{ inputs.runner || vars.CI_RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Shonkor.slnx

      - name: Build (Release)
        run: dotnet build Shonkor.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/Shonkor.Tests/Shonkor.Tests.csproj --configuration Release --no-build --verbosity normal
