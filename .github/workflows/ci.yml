name: CI

on:
  # `develop` is the integration branch — every feature PR targets it, so it MUST be covered here.
  # It was not (#209): the filters named only `main`, so CI ran when develop was promoted to main and
  # never on the PRs that actually introduced the code. Every feature branch merged with no checks at all,
  # which quietly voided the guarantee #182 established (that a Linux runner exercises the file-symlink
  # containment escape). A gate that does not run on the change is not a gate.
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      linux-runner:
        description: 'Runner for the Linux leg of Build & Test'
        type: choice
        default: ubuntu-latest
        options:
          - ubuntu-latest
          - self-hosted

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege for the default GITHUB_TOKEN: this workflow only builds and tests, so it needs to read
# the repo and nothing else. Without an explicit block the token inherits the repo/org default, which can be
# read/write (actions/missing-workflow-permissions). Declared at the top so every job inherits it.
permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.name }})
    # BOTH platforms, every run (#209). Path containment is a SECURITY guard whose two halves are
    # platform-specific, and only one of them was ever tested by CI:
    #   * Linux  — file symlinks need no privilege, so the file-symlink escape (#104) runs for real here.
    #              On Windows it must skip, because a file symlink needs Developer Mode/admin (#182).
    #   * Windows — junctions, drive-letter paths, and the case-INSENSITIVE path comparison that
    #              TryResolveContainedPath depends on. None of that is exercised on Linux at all.
    # Running one platform and inferring the other is precisely the assumption #182 was filed to kill.
    strategy:
      fail-fast: false # a Windows-only break must not hide a Linux-only one, and vice versa
      matrix:
        include:
          # The Linux leg keeps the self-hosted override: it is the leg that was always GitHub-hosted, and
          # moving it to the local runner is the documented escape hatch.
          - name: linux
            runner: ${{ inputs.linux-runner || vars.CI_RUNNER || 'ubuntu-latest' }}
          - name: windows
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Shonkor.slnx

      - name: Build (Release)
        run: dotnet build Shonkor.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/Shonkor.Tests/Shonkor.Tests.csproj --configuration Release --no-build --verbosity normal
